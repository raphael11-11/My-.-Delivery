<!DOCTYPE html>
<html>
<head>
<title>Global Express Courier</title>
<style>
body { font-family: Arial; text-align: center; background:#f4f6f9; }
.box { margin-top:100px; }
input { padding:12px; width:250px; }
button { padding:12px 20px; background:#1f3c68; color:white; border:none; }
</style>
</head>

<body>

<h2>📦 Track Your Package</h2>

<div class="box">
<input type="text" id="code" placeholder="Enter Tracking Code"><br><br>
<button onclick="track()">Track</button>
</div>

<script>
function track(){
let code = document.getElementById("code").value;
if(code==""){
alert("Enter tracking code");
return;
}
window.location.href = "track.html?code=" + code;
}
</script>

</body>
</html>
