<!DOCTYPE html>
<html>
<head>
<title>Tracking</title>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }

.header {
background:#1f3c68;
color:white;
padding:15px;
}

.container {
max-width:500px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
}

input {
width:100%;
padding:12px;
border:2px solid #ccc;
margin-bottom:20px;
}

.card {
background:#e8dccb;
padding:20px;
border-left:5px solid orange;
}

.status {
display:flex;
justify-content:space-between;
margin:20px 0;
}

.circle {
width:35px;
height:35px;
border-radius:50%;
background:#ccc;
text-align:center;
line-height:35px;
color:white;
}

.active { background:green; }
</style>

</head>

<body>

<div class="header">🌐 Global Express Courier</div>

<div class="container">

<h2>Track Package</h2>

<input id="codeBox">

<div id="result"></div>

</div>

<script>
const url = new URLSearchParams(window.location.search);
const code = url.get("code");

document.getElementById("codeBox").value = code;

let data = JSON.parse(localStorage.getItem(code));

if(!data){
document.getElementById("result").innerHTML = "<h3>Tracking Not Found</h3>";
}else{

let shipped="", transit="", hold="";

if(data.status=="Shipped") shipped="active";
if(data.status=="Transit") transit="active";
if(data.status=="Hold") hold="active";

document.getElementById("result").innerHTML = `
<div class="card">
<h3>${data.status}</h3>

<div class="status">
<div>
<div class="circle ${shipped}">✓</div>
Shipped
</div>

<div>
<div class="circle ${transit}">✓</div>
Transit
</div>

<div>
<div class="circle ${hold}">!</div>
Hold
</div>
</div>

<p><b>Tracking:</b> ${code}</p>
<p><b>Location:</b> ${data.location}</p>
<p><b>Date:</b> ${new Date().toDateString()}</p>
</div>
`;
}
</script>

</body>
</html>
